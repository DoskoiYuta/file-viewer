{{if .}}
<ul class="hit-list grep">
{{range .}}
  <li>
    <a class="file-link" href="/view/{{urlPath .Path}}" data-path="{{.Path}}">
      <span class="grep-path">{{.Path}}<span class="grep-line">:{{.Line}}</span></span>
      <span class="grep-text">{{.Text}}</span>
    </a>
  </li>
{{end}}
</ul>
{{else}}
<div class="hint">No matches.</div>
{{end}}
